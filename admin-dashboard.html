<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | CampusCare Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/3f7d7f8b9f.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-shell grid lg:grid-cols-[280px_1fr]">
    <aside class="sidebar p-6 lg:min-h-screen">
      <h1 class="text-2xl font-black">CampusCare Hub</h1>
      <p class="mt-2 text-sm text-white/70">Admin Portal</p>
      <nav class="mt-8 space-y-2 text-sm font-semibold">
        <a class="active block rounded-xl px-4 py-3" href="admin-dashboard.html"><i class="fa-solid fa-gauge mr-2"></i>Dashboard</a>
        <a class="block rounded-xl px-4 py-3" href="admin-complaints.html"><i class="fa-solid fa-list mr-2"></i>Complaints</a>
        <a class="block rounded-xl px-4 py-3" href="admin-profile.html"><i class="fa-solid fa-user mr-2"></i>Profile</a>
      </nav>
      <button data-logout class="mt-10 w-full rounded-xl border border-white/20 px-4 py-3 text-left text-sm font-semibold text-white hover:bg-white/10">Logout</button>
    </aside>

    <main class="p-6 md:p-10 space-y-6">
      <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.25em] text-teal-700">Admin Dashboard</p>
          <h2 id="dashboardGreeting" class="mt-2 text-3xl font-bold text-slate-900">Hello, Admin</h2>
        </div>
      </div>

      <section class="grid gap-4 md:grid-cols-4">
        <div class="card p-6"><p class="text-sm text-slate-500">Total Complaints</p><p class="mt-2 text-3xl font-black text-slate-900" id="totalComplaints">-</p></div>
        <div class="card p-6"><p class="text-sm text-slate-500">Open</p><p class="mt-2 text-3xl font-black text-slate-900" id="openComplaints">-</p></div>
        <div class="card p-6"><p class="text-sm text-slate-500">Assigned</p><p class="mt-2 text-3xl font-black text-slate-900" id="assignedComplaints">-</p></div>
        <div class="card p-6"><p class="text-sm text-slate-500">Resolved</p><p class="mt-2 text-3xl font-black text-slate-900" id="resolvedComplaints">-</p></div>
      </section>

      <section class="grid gap-6 xl:grid-cols-[1.7fr_1fr]">
        <div class="card p-6">
          <div class="mb-4 flex items-center justify-between">
            <h3 class="text-xl font-bold text-slate-900">All complaints</h3>
            <select id="complaintCategoryFilter" class="form-select w-48"></select>
          </div>
          <div class="table-wrap">
            <table class="w-full text-left text-sm">
              <thead class="border-b border-slate-200 text-slate-500">
                <tr>
                  <th class="px-4 py-3 font-medium">Title</th>
                  <th class="px-4 py-3 font-medium">Category</th>
                  <th class="px-4 py-3 font-medium">Assigned To</th>
                  <th class="px-4 py-3 font-medium">Status</th>
                  <th class="px-4 py-3 font-medium">Created</th>
                  <th class="px-4 py-3 font-medium">Action</th>
                </tr>
              </thead>
              <tbody id="complaintRows"></tbody>
            </table>
          </div>
        </div>

        <div class="space-y-6">
          <div class="card p-6">
            <h3 class="text-xl font-bold text-slate-900">Add category</h3>
            <form id="categoryForm" class="mt-4 space-y-3">
              <input class="form-input" type="text" name="categoryName" placeholder="Example: Library Services" required />
              <button class="btn-primary w-full rounded-xl px-4 py-3 font-semibold" type="submit">Save Category</button>
            </form>
          </div>

          <div class="card p-6">
            <h3 class="text-xl font-bold text-slate-900">Categories</h3>
            <ul id="categoryList" class="mt-4 space-y-3"></ul>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>

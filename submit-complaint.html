<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Complaint | CampusCare Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/3f7d7f8b9f.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-shell grid lg:grid-cols-[280px_1fr]">
    <aside class="sidebar p-6 lg:min-h-screen">
      <h1 class="text-2xl font-black">CampusCare Hub</h1>
      <p class="mt-2 text-sm text-white/70">Student Portal</p>
      <nav class="mt-8 space-y-2 text-sm font-semibold">
        <a class="block rounded-xl px-4 py-3" href="student-dashboard.html"><i class="fa-solid fa-chart-line mr-2"></i>Dashboard</a>
        <a class="active block rounded-xl px-4 py-3" href="submit-complaint.html"><i class="fa-solid fa-plus mr-2"></i>Submit Complaint</a>
        <a class="block rounded-xl px-4 py-3" href="student-complaints.html"><i class="fa-solid fa-list mr-2"></i>View Complaints</a>
        <a class="block rounded-xl px-4 py-3" href="student-profile.html"><i class="fa-solid fa-user mr-2"></i>Profile</a>
      </nav>
      <button data-logout class="mt-10 w-full rounded-xl border border-white/20 px-4 py-3 text-left text-sm font-semibold text-white hover:bg-white/10">Logout</button>
    </aside>

    <main class="p-6 md:p-10">
      <div class="card mx-auto max-w-3xl p-6 md:p-8">
        <p class="text-sm font-semibold uppercase tracking-[0.25em] text-teal-700">Complaint Submission</p>
        <h2 class="mt-2 text-3xl font-bold text-slate-900">Create a new complaint</h2>
        <p class="mt-2 text-slate-500">Provide clear details so the support team can act quickly.</p>

        <form id="complaintForm" class="mt-8 grid gap-5">
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">Title</label>
            <input class="form-input" type="text" name="title" placeholder="Example: Broken projector in lecture hall" required />
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">Category</label>
            <select class="form-select" id="category" name="category" required></select>
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">Description</label>
            <textarea class="form-textarea" name="description" rows="5" placeholder="Explain the issue, location, and impact." required></textarea>
          </div>
          <button class="btn-primary rounded-xl px-4 py-3 font-semibold" type="submit">Submit Complaint</button>
        </form>
      </div>
    </main>
  </div>

  <script type="module" src="js/student.js"></script>
</body>
</html>

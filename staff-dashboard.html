<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Dashboard | CampusCare Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/3f7d7f8b9f.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-shell grid lg:grid-cols-[280px_1fr]">
    <aside class="sidebar p-6 lg:min-h-screen">
      <h1 class="text-2xl font-black">CampusCare Hub</h1>
      <p class="mt-2 text-sm text-white/70">Support Staff Portal</p>
      <nav class="mt-8 space-y-2 text-sm font-semibold">
        <a class="active block rounded-xl px-4 py-3" href="staff-dashboard.html"><i class="fa-solid fa-clipboard-list mr-2"></i>Dashboard</a>
        <a class="block rounded-xl px-4 py-3" href="staff-complaints.html"><i class="fa-solid fa-list mr-2"></i>Complaints</a>
        <a class="block rounded-xl px-4 py-3" href="staff-profile.html"><i class="fa-solid fa-user mr-2"></i>Profile</a>
      </nav>
      <button data-logout class="mt-10 w-full rounded-xl border border-white/20 px-4 py-3 text-left text-sm font-semibold text-white hover:bg-white/10">Logout</button>
    </aside>

    <main class="p-6 md:p-10">
      <div class="mb-8">
        <p class="text-sm font-semibold uppercase tracking-[0.25em] text-teal-700">Staff Dashboard</p>
        <h2 id="dashboardGreeting" class="mt-2 text-3xl font-bold text-slate-900">Hello, Staff</h2>
      </div>

      <section class="card p-6">
        <div class="mb-4 flex items-center justify-between">
          <h3 class="text-xl font-bold text-slate-900">Assigned complaints</h3>
          <span class="text-sm text-slate-500">Update status as you progress</span>
        </div>
        <div class="table-wrap">
          <table class="w-full text-left text-sm">
            <thead class="border-b border-slate-200 text-slate-500">
              <tr>
                <th class="px-4 py-3 font-medium">Title</th>
                <th class="px-4 py-3 font-medium">Category</th>
                <th class="px-4 py-3 font-medium">Status</th>
                <th class="px-4 py-3 font-medium">Created</th>
                <th class="px-4 py-3 font-medium">Action</th>
              </tr>
            </thead>
            <tbody id="assignedRows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="js/staff.js"></script>
</body>
</html>

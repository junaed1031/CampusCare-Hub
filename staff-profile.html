<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Profile | CampusCare Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/3f7d7f8b9f.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-shell grid lg:grid-cols-[280px_1fr]">
    <aside class="sidebar p-6 lg:min-h-screen">
      <h1 class="text-2xl font-black">CampusCare Hub</h1>
      <p class="mt-2 text-sm text-white/70">Support Staff Portal</p>
      <nav class="mt-8 space-y-2 text-sm font-semibold">
        <a class="block rounded-xl px-4 py-3" href="staff-dashboard.html"><i class="fa-solid fa-clipboard-list mr-2"></i>Dashboard</a>
        <a class="block rounded-xl px-4 py-3" href="staff-complaints.html"><i class="fa-solid fa-list mr-2"></i>Complaints</a>
        <a class="active block rounded-xl px-4 py-3" href="staff-profile.html"><i class="fa-solid fa-user mr-2"></i>Profile</a>
      </nav>
      <button data-logout class="mt-10 w-full rounded-xl border border-white/20 px-4 py-3 text-left text-sm font-semibold text-white hover:bg-white/10">Logout</button>
    </aside>

    <main class="p-6 md:p-10">
      <div class="card mx-auto max-w-2xl p-6 md:p-8">
        <p class="text-sm font-semibold uppercase tracking-[0.25em] text-teal-700">Staff Profile</p>
        <h2 class="mt-2 text-3xl font-bold text-slate-900">Your account details</h2>

        <div class="mt-8 grid gap-4 sm:grid-cols-2">
          <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
            <p class="text-sm text-slate-500">Name</p>
            <p id="profileName" class="mt-1 text-lg font-semibold text-slate-900">-</p>
          </div>
          <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
            <p class="text-sm text-slate-500">Email</p>
            <p id="profileEmail" class="mt-1 text-lg font-semibold text-slate-900">-</p>
          </div>
          <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4 sm:col-span-2">
            <p class="text-sm text-slate-500">Role</p>
            <p id="profileRole" class="mt-1 text-lg font-semibold text-slate-900">-</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/profile.js"></script>
</body>
</html>
